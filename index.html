<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muzeyin Audio Bələdçisi</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .player-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .title { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #333; }
        audio { width: 100%; margin-top: 10px; border-radius: 10px; }
        .footer { margin-top: 15px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="player-card">
    <div class="title">Hacı Zeynalabdin Tağıyevin İş Kabineti</div>
    <audio controls>
        <source src="birinci_otaq.mp3" type="audio/mpeg">
    Brauzeriniz bu audionu dəstəkləmir.
    </audio>
    <div class="footer">Milli Azərbaycan Tarixi Muzeyi</div>
</div>

</body>
</html>
