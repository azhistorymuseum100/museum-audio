    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --border-color: #dddddd;
            --accent-az: #0056b3; /* Azərbaycan dili üçün mavi düymə */
            --accent-en: #b30000; /* İngilis dili üçün qırmızı/tünd düymə */
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-color); 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box; 
            -webkit-font-smoothing: antialiased; 
            position: relative;
        }

        .screen { 
            background: var(--card-bg); 
            padding: 30px 25px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 450px; 
            text-align: center; 
            display: none; 
            flex-direction: column;
            box-sizing: border-box;
        }

        .screen.active { 
            display: flex; 
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Dil seçimi ekranının stilləri */
        .welcome-icon { font-size: 50px; margin-bottom: 10px; }

        .welcome-desc { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-bottom: 25px; }
        
        .btn-lang { 
            color: white; 
            border: none; 
            padding: 16px 20px; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: opacity 0.3s;
            width: 100%;
            margin-bottom: 15px;
        }
        .btn-lang:active { opacity: 0.8; }
        .btn-az { background: var(--accent-az); }
        .btn-en { background: var(--accent-en); margin-bottom: 5px; }
